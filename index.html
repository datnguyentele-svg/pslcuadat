<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Scorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            background: #000;
            border-radius: 20px;
            padding: 30px 20px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .header-icon {
            width: 50px;
            height: 50px;
            border: 2px solid #00CED1;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .appstore-icon {
            width: 50px;
            height: 50px;
            background: #007AFF;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        /* AVATAR */
        .avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #333;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .play-button:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 20px solid #000;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 5px;
        }

        /* SCORE BOXES */
        .score-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .score-box {
            background: #1a1a1a;
            border: 2px solid #00CED1;
            border-radius: 15px;
            padding: 25px 20px;
            text-align: left;
        }

        .score-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00CED1;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 3rem;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }

        .score-tier {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00CED1;
            border-radius: 4px;
            transition: width 1s ease;
        }

        /* UPLOAD SECTION */
        .upload-section {
            text-align: center;
            margin-top: 30px;
        }

        .upload-btn {
            background: #00CED1;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            background: #00B8B8;
            transform: translateY(-2px);
        }

        .upload-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        /* LOADING */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(0, 206, 209, 0.2);
            border-top: 4px solid #00CED1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* HIDDEN FILE INPUT */
        #fileInput {
            display: none;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .score-value {
                font-size: 2.5rem;
            }
            
            .avatar-container {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-icon"></div>
            <div class="header-title">PSL</div>
            <div class="appstore-icon">🍎</div>
        </div>

        <!-- AVATAR -->
        <div class="avatar-container">
            <img src="https://via.placeholder.com/200" alt="Avatar" class="avatar" id="avatarImage">
            <div class="play-button" id="playButton"></div>
        </div>

        <!-- SCORE BOXES -->
        <div class="score-container">
            <div class="score-box">
                <div class="score-label">PSL</div>
                <div class="score-value" id="pslScore">0.0</div>
                <div class="score-tier" id="pslTier">• Loading...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="pslProgress" style="width: 0%"></div>
                </div>
            </div>
            <div class="score-box">
                <div class="score-label">POTENTIAL</div>
                <div class="score-value" id="potentialScore">0.0</div>
                <div class="score-tier" id="potentialTier">• Loading...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="potentialProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- UPLOAD -->
        <div class="upload-section">
            <input type="file" id="fileInput" accept="image/*">
            <button class="upload-btn" id="uploadBtn">📸 Tải ảnh lên</button>
        </div>

        <!-- LOADING -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Đang phân tích...</p>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const avatarImage = document.getElementById('avatarImage');
        const loading = document.getElementById('loading');

        // Click upload button
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // Handle file select
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Show loading
            loading.classList.add('show');
            uploadBtn.disabled = true;

            // Display image
            const reader = new FileReader();
            reader.onload = (event) => {
                avatarImage.src = event.target.result;
            };
            reader.readAsDataURL(file);

            // Simulate API call (2 seconds)
            setTimeout(() => {
                // DEMO DATA - Thay bằng API thật sau
                const demoData = {
                    psl: 7.1,
                    pslTier: 'Chad',
                    potential: 7.6,
                    potentialTier: 'True Adam'
                };

                updateScores(demoData);
                loading.classList.remove('show');
                uploadBtn.disabled = false;
            }, 2000);
        });

        function updateScores(data) {
            // PSL Score
            document.getElementById('pslScore').textContent = data.psl.toFixed(1);
            document.getElementById('pslTier').textContent = `• ${data.pslTier}`;
            document.getElementById('pslProgress').style.width = `${(data.psl / 10) * 100}%`;

            // Potential Score
            document.getElementById('potentialScore').textContent = data.potential.toFixed(1);
            document.getElementById('potentialTier').textContent = `• ${data.potentialTier}`;
            document.getElementById('potentialProgress').style.width = `${(data.potential / 10) * 100}%`;
        }

        // Play button click
        document.getElementById('playButton').addEventListener('click', () => {
            alert('Tính năng video đang phát triển!');
        });
    </script>
</body>
</html>
