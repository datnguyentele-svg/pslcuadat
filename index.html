<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Scorer - AI Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 25px;
            padding: 25px 20px;
            border: 1px solid #1a1a1a;
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .header-icon {
            width: 45px; height: 45px;
            border: 2px solid #5CE1E6;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .header-title { font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; }
        .appstore-icon {
            width: 45px; height: 45px;
            background: #007AFF;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .avatar-container {
            position: relative;
            width: 180px; height: 180px;
            margin: 0 auto 30px;
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #5CE1E6;
        }
        .avatar-placeholder {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            border: 3px dashed #5CE1E6;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem;
            cursor: pointer;
        }
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        .score-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 18px 15px;
            position: relative;
            overflow: hidden;
        }
        .score-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
        }
        .score-card-label {
            font-size: 0.85rem; font-weight: bold;
            color: #5CE1E6;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .score-card-value {
            font-size: 2.2rem; font-weight: bold;
            color: white;
            margin-bottom: 3px;
        }
        .score-card-tier {
            font-size: 0.9rem; color: #888;
            margin-bottom: 12px;
        }
        .score-card-tier .dot { color: #5CE1E6; margin-right: 5px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
            border-radius: 3px;
            transition: width 1s ease;
            box-shadow: 0 0 10px rgba(92, 225, 230, 0.5);
        }
        .upload-section { text-align: center; margin-top: 20px; }
        .upload-btn {
            background: linear-gradient(135deg, #5CE1E6, #00CED1);
            color: #000;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-size: 1rem; font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .upload-btn:disabled { background: #555; cursor: not-allowed; }
        #fileInput { display: none; }
        .loading {
            display: none; text-align: center; padding: 20px;
        }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid rgba(92, 225, 230, 0.2);
            border-top: 3px solid #5CE1E6;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .score-card.hidden { opacity: 0.3; }
        .score-card.hidden .score-card-value { color: #555; }
        
        .api-section {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .api-section label {
            display: block;
            color: #5CE1E6;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .api-input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
        }
        .api-input:focus {
            outline: none;
            border-color: #5CE1E6;
        }
        .api-link {
            display: block;
            color: #888;
            font-size: 0.75rem;
            margin-top: 8px;
            text-decoration: none;
        }
        .api-link:hover { color: #5CE1E6; }
        
        .error-msg {
            background: #331111;
            border: 1px solid #ff4444;
            color: #ff6666;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 0.9rem;
        }
        .error-msg.show { display: block; }
        
        .mode-badge {
            display: inline-block;
            background: #5CE1E6;
            color: #000;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-icon"></div>
            <div class="header-title">PSL</div>
            <div class="appstore-icon">🍎</div>
        </div>

        <div class="avatar-container">
            <div class="avatar-placeholder" id="avatarPlaceholder" onclick="document.getElementById('fileInput').click()">📸</div>
            <img src="" alt="Avatar" class="avatar" id="avatarImage" style="display: none;">
        </div>

        <div class="api-section">
            <label>🔑 Hugging Face API Token <span class="mode-badge" id="modeBadge">AI MODE</span></label>
            <input type="password" id="apiToken" class="api-input" placeholder="hf_xxxxxxxxxxxx">
            <a href="https://huggingface.co/settings/tokens" target="_blank" class="api-link">
                → Lấy token miễn phí tại đây (chỉ cần email)
            </a>
        </div>

        <div class="score-grid">
            <div class="score-card hidden" id="card-overall">
                <div class="score-card-label">TỔNG THỂ</div>
                <div class="score-card-value" id="overallScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="overallTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="overallProgress" style="width: 0%"></div></div>
            </div>
            
            <div class="score-card hidden" id="card-potential">
                <div class="score-card-label">TIỀM NĂNG</div>
                <div class="score-card-value" id="potentialScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="potentialTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="potentialProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-appeal">
                <div class="score-card-label">APPEAL</div>
                <div class="score-card-value" id="appealScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="appealTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="appealProgress" style="width: 0%"></div></div>

            <div class="score-card hidden" id="card-jaw">
                <div class="score-card-label">HÀM (JAW)</div>
                <div class="score-card-value" id="jawScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="jawTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="jawProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-eyes">
                <div class="score-card-label">MẮT (EYES)</div>
                <div class="score-card-value" id="eyesScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="eyesTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="eyesProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-nose">
                <div class="score-card-label">MŨI (NOSE)</div>
                <div class="score-card-value" id="noseScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="noseTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="noseProgress" style="width: 0%"></div></div>
            </div>
            
            <div class="score-card hidden" id="card-skin">
                <div class="score-card-label">DA MẶT (SKIN)</div>
                <div class="score-card-value" id="skinScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="skinTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="skinProgress" style="width: 0%"></div></div>
            </div>
        </div>

        <div class="upload-section">
            <input type="file" id="fileInput" accept="image/*">
            <button class="upload-btn" id="uploadBtn"> Tải ảnh lên để AI chấm điểm</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #5CE1E6;" id="loadingText">🤖 AI đang phân tích...</p>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ==========================================
        // CONFIGURATION - MODEL MỚI ỔN ĐỊNH HƠN
        // ==========================================
        
        // Dùng model Vision-Language đơn giản hơn, ổn định hơn
        const HF_API_URL = "https://api-inference.huggingface.co/models/llava-hf/llava-1.5-7b-hf";
        
        const SYSTEM_PROMPT = `You are a facial attractiveness rating expert using PSL/BowMax system.
Rate this person's facial features STRICTLY and OBJECTIVELY.

SCORING SCALE (out of 100):
- AVERAGE person: 50-55 points (MTN)
- Slightly attractive: 55-60 (MTN+)
- Clearly attractive: 60-70 (HTN)
- Very attractive: 70-80 (Chad)
- Exceptional: 80+ (Gigachad)

RATE THESE FEATURES:
1. APPEAL: Overall attractiveness (hair, vibe, general look)
2. JAW: Jawline definition, chin, gonial angle (usually weakest for Asian males)
3. EYES: Eye size, eyelid type, eye spacing
4. NOSE: Nose bridge height, tip definition, nose-to-face ratio
5. SKIN: Skin clarity, evenness, acne

CALCULATE:
- OVERALL = weighted average (jaw 25%, appeal 25%, eyes 20%, nose 15%, skin 15%)
- POTENTIAL = OVERALL + (100 - OVERALL) × 0.4

TIERS:
- <50: LTN (Low-Tier Normie)
- 50-59: MTN (Mid-Tier Normie)
- 60-69: HTN (High-Tier Normie)
- 70-79: Chad
- 80+: Gigachad

Return ONLY valid JSON in this exact format (NO other text):
{
  "appeal": 52,
  "jaw": 48,
  "eyes": 51,
  "nose": 55,
  "skin": 57,
  "overall": 52,
  "potential": 71
}`;

        // ==========================================
        // RULE-BASED FALLBACK (MediaPipe)
        // ==========================================
        
        function euclideanDistance(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }

        function calculateAngle(p1, p2, p3) {
            const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
            const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
            const dotProduct = v1.x * v2.x + v1.y * v2.y;
            const magnitude = Math.sqrt(v1.x * v1.x + v1.y * v1.y) * Math.sqrt(v2.x * v2.x + v2.y * v2.y);
            if (magnitude === 0) return 125;
            const cosTheta = Math.max(-1, Math.min(1, dotProduct / magnitude));
            return Math.acos(cosTheta) * (180 / Math.PI);
        }

        function normalizeScore(actual, ideal, tolerance) {
            const deviation = Math.abs(actual - ideal);
            const score = 100 - (deviation / tolerance) * 100;
            return Math.max(30, Math.min(100, score));
        }

        function analyzeWithMediaPipe(landmarks) {
            const faceWidth = euclideanDistance(landmarks[234], landmarks[454]);
            const faceHeight = euclideanDistance(landmarks[10], landmarks[152]);
            const faceRatio = faceHeight / faceWidth;
            
            const appealScore = normalizeScore(faceRatio, 1.55, 0.3);
            
            const jawAngle = calculateAngle(landmarks[172], landmarks[152], landmarks[397]);
            const jawScore = normalizeScore(jawAngle, 125, 20) * 0.85;
            
            const eyeDistance = euclideanDistance(landmarks[33], landmarks[263]);
            const eyeRatio = eyeDistance / faceWidth;
            const eyesScore = normalizeScore(eyeRatio, 0.44, 0.08);
            
            const noseLength = euclideanDistance(landmarks[6], landmarks[2]);
            const noseWidth = euclideanDistance(landmarks[98], landmarks[327]);
            const noseRatio = noseLength / (noseWidth || 1);
            const noseScore = normalizeScore(noseRatio, 1.1, 0.4);
            
            const skinScore = 58 + (Math.random() * 4 - 2);

            const weights = { appeal: 0.20, jaw: 0.25, eyes: 0.20, nose: 0.20, skin: 0.15 };
            const overallScore = (appealScore * weights.appeal) + 
                                 (jawScore * weights.jaw) + 
                                 (eyesScore * weights.eyes) + 
                                 (noseScore * weights.nose) + 
                                 (skinScore * weights.skin);

            const potentialScore = overallScore + (100 - overallScore) * 0.4;

            return {
                appeal: Math.round(appealScore),
                jaw: Math.round(jawScore),
                eyes: Math.round(eyesScore),
                nose: Math.round(noseScore),
                skin: Math.round(skinScore),
                overall: Math.round(overallScore),
                potential: Math.round(potentialScore)
            };
        }

        // ==========================================
        // AI VISION API CALL - MODEL MỚI
        // ==========================================
        
        async function analyzeWithAI(imageBase64, apiToken) {
            const response = await fetch(HF_API_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `
