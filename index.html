<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Scorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .app-container {
            max-width: 450px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 25px;
            padding: 25px 20px;
            border: 1px solid #1a1a1a;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .header-icon {
            width: 45px;
            height: 45px;
            border: 2px solid #5CE1E6;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .appstore-icon {
            width: 45px;
            height: 45px;
            background: #007AFF;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
        }

        /* AVATAR */
        .avatar-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #333;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            border: 3px dashed #5CE1E6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar-placeholder:hover {
            background: #2a2a2a;
            border-color: #00CED1;
        }

        /* SCORE GRID */
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .score-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 18px 15px;
            position: relative;
            overflow: hidden;
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
        }

        .score-card-label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #5CE1E6;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .score-card-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 3px;
        }

        .score-card-tier {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 12px;
        }

        .score-card-tier .dot {
            color: #5CE1E6;
            margin-right: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
            border-radius: 3px;
            transition: width 1s ease;
            box-shadow: 0 0 10px rgba(92, 225, 230, 0.5);
        }

        /* UPLOAD BUTTON */
        .upload-section {
            text-align: center;
            margin-top: 20px;
        }

        .upload-btn {
            background: linear-gradient(135deg, #5CE1E6, #00CED1);
            color: #000;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(92, 225, 230, 0.3);
        }

        .upload-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #fileInput {
            display: none;
        }

        /* LOADING */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(92, 225, 230, 0.2);
            border-top: 3px solid #5CE1E6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* HIDE SCORE CARDS INITIALLY */
        .score-card.hidden {
            opacity: 0.3;
        }

        .score-card.hidden .score-card-value {
            color: #555;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .app-container {
                padding: 20px 15px;
            }
            
            .score-card-value {
                font-size: 1.8rem;
            }
            
            .avatar-container {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-icon">👤</div>
            <div class="header-title">PSL</div>
            <div class="appstore-icon">🍎</div>
        </div>

        <!-- AVATAR -->
        <div class="avatar-container">
            <div class="avatar-placeholder" id="avatarPlaceholder" onclick="document.getElementById('fileInput').click()">
                📸
            </div>
            <img src="" alt="Avatar" class="avatar" id="avatarImage" style="display: none;">
        </div>

        <!-- SCORE GRID -->
        <div class="score-grid">
            <div class="score-card hidden" id="card-psl">
                <div class="score-card-label">PSL</div>
                <div class="score-card-value" id="pslScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="pslTier">Chưa chấm</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="pslProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="score-card hidden" id="card-potential">
                <div class="score-card-label">POTENTIAL</div>
                <div class="score-card-value" id="potentialScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="potentialTier">Chưa chấm</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="potentialProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="score-card hidden" id="card-eyes">
                <div class="score-card-label">EYES</div>
                <div class="score-card-value" id="eyesScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="eyesTier">Chưa chấm</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="eyesProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="score-card hidden" id="card-midface">
                <div class="score-card-label">MIDFACE</div>
                <div class="score-card-value" id="midfaceScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="midfaceTier">Chưa chấm</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="midfaceProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="score-card hidden" id="card-lower">
                <div class="score-card-label">LOWER THIRD</div>
                <div class="score-card-value" id="lowerScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="lowerTier">Chưa chấm</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="lowerProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="score-card hidden" id="card-upper">
                <div class="score-card-label">UPPER THIRD</div>
                <div class="score-card-value" id="upperScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="upperTier">Chưa chấm</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="upperProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- UPLOAD -->
        <div class="upload-section">
            <input type="file" id="fileInput" accept="image/*">
            <button class="upload-btn" id="uploadBtn"> Tải ảnh lên để chấm điểm</button>
        </div>

        <!-- LOADING -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #5CE1E6;">Đang phân tích khuôn mặt...</p>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const avatarImage = document.getElementById('avatarImage');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');
        const loading = document.getElementById('loading');

        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            loading.classList.add('show');
            uploadBtn.disabled = true;

            const reader = new FileReader();
            reader.onload = (event) => {
                avatarImage.src = event.target.result;
                avatarImage.style.display = 'block';
                avatarPlaceholder.style.display = 'none';
            };
            reader.readAsDataURL(file);

            // DEMO DATA - Giống ảnh bạn gửi
            setTimeout(() => {
                const demoData = {
                    psl: 8.0,
                    pslTier: 'PSL God',
                    potential: 8.0,
                    potentialTier: 'PSL God',
                    eyes: 7.9,
                    eyesTier: 'Excellent',
                    midface: 7.8,
                    midfaceTier: 'Excellent',
                    lower: 7.9,
                    lowerTier: 'Excellent',
                    upper: 7.8,
                    upperTier: 'Excellent'
                };

                updateScores(demoData);
                loading.classList.remove('show');
                uploadBtn.disabled = false;
            }, 2000);
        });

        function updateScores(data) {
            const cards = ['psl', 'potential', 'eyes', 'midface', 'lower', 'upper'];
            
            cards.forEach(card => {
                const score = data[card];
                const tier = data[card + 'Tier'];
                const maxScore = 10;
                
                document.getElementById(card + 'Score').textContent = score.toFixed(1);
                document.getElementById(card + 'Tier').textContent = tier;
                document.getElementById(card + 'Progress').style.width = `${(score / maxScore) * 100}%`;
                document.getElementById('card-' + card).classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
