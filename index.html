<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Scorer - Vercel AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 25px;
            padding: 25px 20px;
            border: 1px solid #1a1a1a;
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .header-icon {
            width: 45px; height: 45px;
            border: 2px solid #5CE1E6;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .header-title { font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; }
        .appstore-icon {
            width: 45px; height: 45px;
            background: #007AFF;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .avatar-container {
            position: relative;
            width: 180px; height: 180px;
            margin: 0 auto 30px;
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #5CE1E6;
        }
        .avatar-placeholder {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            border: 3px dashed #5CE1E6;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem;
            cursor: pointer;
        }
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        .score-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 18px 15px;
            position: relative;
            overflow: hidden;
        }
        .score-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
        }
        .score-card-label {
            font-size: 0.85rem; font-weight: bold;
            color: #5CE1E6;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .score-card-value {
            font-size: 2.2rem; font-weight: bold;
            color: white;
            margin-bottom: 3px;
        }
        .score-card-tier {
            font-size: 0.9rem; color: #888;
            margin-bottom: 12px;
        }
        .score-card-tier .dot { color: #5CE1E6; margin-right: 5px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
            border-radius: 3px;
            transition: width 1s ease;
            box-shadow: 0 0 10px rgba(92, 225, 230, 0.5);
        }
        .upload-section { text-align: center; margin-top: 20px; }
        .upload-btn {
            background: linear-gradient(135deg, #5CE1E6, #00CED1);
            color: #000;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-size: 1rem; font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .upload-btn:disabled { background: #555; cursor: not-allowed; }
        #fileInput { display: none; }
        .loading {
            display: none; text-align: center; padding: 20px;
        }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid rgba(92, 225, 230, 0.2);
            border-top: 3px solid #5CE1E6;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .score-card.hidden { opacity: 0.3; }
        .score-card.hidden .score-card-value { color: #555; }
        
        .api-section {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .api-section label {
            display: block;
            color: #5CE1E6;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .api-input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .api-input:focus {
            outline: none;
            border-color: #5CE1E6;
        }
        .api-hint {
            color: #888;
            font-size: 0.75rem;
            margin-top: 5px;
        }
        
        .error-msg {
            background: #331111;
            border: 1px solid #ff4444;
            color: #ff6666;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 0.9rem;
        }
        .error-msg.show { display: block; }
        
        .mode-badge {
            display: inline-block;
            background: #5CE1E6;
            color: #000;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-icon"></div>
            <div class="header-title">PSL</div>
            <div class="appstore-icon">🍎</div>
        </div>

        <div class="avatar-container">
            <div class="avatar-placeholder" id="avatarPlaceholder" onclick="document.getElementById('fileInput').click()">📸</div>
            <img src="" alt="Avatar" class="avatar" id="avatarImage" style="display: none;">
        </div>

        <!-- Vercel AI Gateway Config -->
        <div class="api-section">
            <label> Vercel AI Gateway URL</label>
            <input type="text" id="gatewayUrl" class="api-input" placeholder="https://your-app.vercel.app/api/chat">
            <label style="margin-top: 12px;"> API Key (nếu có)</label>
            <input type="password" id="apiKey" class="api-input" placeholder="sk-xxxxxxxx">
            <div class="api-hint">→ Bạn của bạn sẽ cung cấp 2 thông tin này</div>
        </div>

        <div class="score-grid">
            <div class="score-card hidden" id="card-overall">
                <div class="score-card-label">TỔNG THỂ</div>
                <div class="score-card-value" id="overallScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="overallTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="overallProgress" style="width: 0%"></div></div>
            </div>
            
            <div class="score-card hidden" id="card-potential">
                <div class="score-card-label">TIỀM NĂNG</div>
                <div class="score-card-value" id="potentialScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="potentialTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="potentialProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-appeal">
                <div class="score-card-label">APPEAL</div>
                <div class="score-card-value" id="appealScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="appealTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="appealProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-jaw">
                <div class="score-card-label">HÀM (JAW)</div>
                <div class="score-card-value" id="jawScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="jawTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="jawProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-eyes">
                <div class="score-card-label">MẮT (EYES)</div>
                <div class="score-card-value" id="eyesScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="eyesTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="eyesProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-nose">
                <div class="score-card-label">MŨI (NOSE)</div>
                <div class="score-card-value" id="noseScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="noseTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="noseProgress" style="width: 0%"></div></div>
            </div>
            
            <div class="score-card hidden" id="card-skin">
                <div class="score-card-label">DA MẶT (SKIN)</div>
                <div class="score-card-value" id="skinScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="skinTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="skinProgress" style="width: 0%"></div></div>
            </div>
        </div>

        <div class="upload-section">
            <input type="file" id="fileInput" accept="image/*">
            <button class="upload-btn" id="uploadBtn"> Tải ảnh lên để AI chấm điểm</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #5CE1E6;" id="loadingText">🤖 AI đang phân tích...</p>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ==========================================
        // VERCEL AI GATEWAY INTEGRATION
        // ==========================================
        
        const SYSTEM_PROMPT = `Bạn là chuyên gia chấm điểm nhan sắc nam giới theo hệ thống PSL/BowMax.
Chấm điểm THẬT CHẶT CHẼ, KHÁCH QUAN.

YÊU CẦU:
- Người BÌNH THƯỜNG: 50-55 điểm (MTN)
- Người hơi đẹp: 55-60 điểm (MTN+)  
- Người ĐP RÕ RÀNG: 60-70 điểm (HTN)
- Người RẤT ĐẸP: 70-80 điểm (Chad)
- Cực phẩm: 80+ (Gigachad)

CHỈ SỐ CẦN CHẤM:
1. APPEAL: Thu hút tổng thể
2. HÀM (JAW): Góc hàm, jawline (thường là điểm yếu nhất)
3. MẮT (EYES): Kích thước, mí mắt
4. MŨI (NOSE): Sống mũi, đầu mũi
5. DA MẶT (SKIN): Độ sạch, đều màu

CÔNG THỨC:
- TỔNG THỂ = trung bình có trọng số (jaw 25%, appeal 25%, eyes 20%, nose 15%, skin 15%)
- TIỀM NĂNG = TỔNG THỂ + (100 - TỔNG THỂ) × 0.4

TIER:
- <50: LTN
- 50-59: MTN
- 60-69: HTN
- 70-79: Chad
- 80+: Gigachad

TRẢ VỀ JSON ĐÚNG FORMAT (KHÔNG thêm text khác):
{
  "appeal": 52,
  "jaw": 48,
  "eyes": 51,
  "nose": 55,
  "skin": 57,
  "overall": 52,
  "potential": 71
}`;

        async function analyzeWithVercelAI(imageBase64, gatewayUrl, apiKey) {
            const response = await fetch(gatewayUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    ...(apiKey && { "Authorization": `Bearer ${apiKey}` })
                },
                body: JSON.stringify({
                    messages: [
                        {
                            role: "system",
                            content: SYSTEM_PROMPT
                        },
                        {
                            role: "user",
                            content: [
                                {
                                    type: "image_url",
                                    image_url: { url: imageBase64 }
                                },
                                {
                                    type: "text",
                                    text: "Chấm điểm khuôn mặt này theo hệ thống PSL. Trả về JSON."
                                }
                            ]
                        }
                    ],
                    max_tokens: 500,
                    temperature: 0.3
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API Error ${response.status}: ${errText}`);
            }

            const data = await response.json();
            
            // Parse response from Vercel AI Gateway
            const aiText = data.choices?.[0]?.message?.content || 
                          data.message?.content || 
                          JSON.stringify(data);
            
            const jsonMatch = aiText.match(/\{[\s\S]*?\}/);
            if (!jsonMatch) {
                throw new Error("AI không trả về JSON hợp lệ");
            }
            
            return JSON.parse(jsonMatch[0]);
        }

        function classifyTier(score) {
            if (score < 50) return "LTN";
            if (score < 60) return "MTN";
            if (score < 70) return "HTN";
            if (score < 80) return "Chad";
            return "Gigachad";
        }

        // ==========================================
        // UI HANDLERS
        // ==========================================
        
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const avatarImage = document.getElementById('avatarImage');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const errorMsg = document.getElementById('errorMsg');
        const gatewayUrlInput = document.getElementById('gatewayUrl');
        const apiKeyInput = document.getElementById('apiKey');

        // Load saved config
        const savedGateway = localStorage.getItem('vercel_gateway_url');
        const savedApiKey = localStorage.getItem('vercel_api_key');
        if (savedGateway) gatewayUrlInput.value = savedGateway;
        if (savedApiKey) apiKeyInput.value = savedApiKey;

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const gatewayUrl = gatewayUrlInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            
            if (!gatewayUrl) {
                showError("⚠️ Vui lòng nhập Vercel AI Gateway URL!");
                return;
            }

            // Save config
            localStorage.setItem('vercel_gateway_url', gatewayUrl);
            if (apiKey) localStorage.setItem('vercel_api_key', apiKey);

            loading.classList.add('show');
            uploadBtn.disabled = true;
            errorMsg.classList.remove('show');
            loadingText.textContent = '🤖 AI đang phân tích khuôn mặt...';
            
            ['overall', 'potential', 'appeal', 'jaw', 'eyes', 'nose', 'skin'].forEach(f => {
                document.getElementById('card-' + f).classList.add('hidden');
            });

            const reader = new FileReader();
            reader.onload = async (event) => {
                avatarImage.src = event.target.result;
                avatarImage.style.display = 'block';
                avatarPlaceholder.style.display = 'none';

                try {
                    const results = await analyzeWithVercelAI(event.target.result, gatewayUrl, apiKey);
                    
                    const scores = {
                        overall: Math.round(results.overall || 50),
                        potential: Math.round(results.potential || 60),
                        appeal: Math.round(results.appeal || 50),
                        jaw: Math.round(results.jaw || 48),
                        eyes: Math.round(results.eyes || 50),
                        nose: Math.round(results.nose || 55),
                        skin: Math.round(results.skin || 57)
                    };

                    updateUI(scores);
                } catch (error) {
                    console.error(error);
                    showError("❌ Lỗi: " + error.message);
                } finally {
                    loading.classList.remove('show');
                    uploadBtn.disabled = false;
                }
            };
            reader.readAsDataURL(file);
        });

        function updateUI(scores) {
            const fields = ['overall', 'potential', 'appeal', 'jaw', 'eyes', 'nose', 'skin'];
            
            fields.forEach(field => {
                const score = scores[field];
                const tier = classifyTier(score);
                
                document.getElementById(field + 'Score').textContent = score;
                document.getElementById(field + 'Tier').textContent = tier;
                document.getElementById(field + 'Progress').style.width = `${score}%`;
                document.getElementById('card-' + field).classList.remove('hidden');
            });
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            loading.classList.remove('show');
            uploadBtn.disabled = false;
        }
    </script>
</body>
</html>
