<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Scorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 25px;
            padding: 25px 20px;
            border: 1px solid #1a1a1a;
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .header-icon {
            width: 45px; height: 45px;
            border: 2px solid #5CE1E6;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .header-title { font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; }
        .appstore-icon {
            width: 45px; height: 45px;
            background: #007AFF;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .avatar-container {
            position: relative;
            width: 180px; height: 180px;
            margin: 0 auto 30px;
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #5CE1E6;
        }
        .avatar-placeholder {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            border: 3px dashed #5CE1E6;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem;
            cursor: pointer;
        }
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        .score-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 18px 15px;
            position: relative;
            overflow: hidden;
        }
        .score-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
        }
        .score-card-label {
            font-size: 0.85rem; font-weight: bold;
            color: #5CE1E6;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .score-card-value {
            font-size: 2.2rem; font-weight: bold;
            color: white;
            margin-bottom: 3px;
        }
        .score-card-tier {
            font-size: 0.9rem; color: #888;
            margin-bottom: 12px;
        }
        .score-card-tier .dot { color: #5CE1E6; margin-right: 5px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
            border-radius: 3px;
            transition: width 1s ease;
