<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Scorer - Strict Mode</title>
    <!-- MediaPipe Face Mesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 25px;
            padding: 25px 20px;
            border: 1px solid #1a1a1a;
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .header-icon {
            width: 45px; height: 45px;
            border: 2px solid #5CE1E6;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .header-title { font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; }
        .appstore-icon {
            width: 45px; height: 45px;
            background: #007AFF;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .avatar-container {
            position: relative;
            width: 180px; height: 180px;
            margin: 0 auto 30px;
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #5CE1E6;
        }
        .avatar-placeholder {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            border: 3px dashed #5CE1E6;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem;
            cursor: pointer;
        }
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        .score-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 18px 15px;
            position: relative;
            overflow: hidden;
        }
        .score-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
        }
        .score-card-label {
            font-size: 0.85rem; font-weight: bold;
            color: #5CE1E6;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .score-card-value {
            font-size: 2.2rem; font-weight: bold;
            color: white;
            margin-bottom: 3px;
        }
        .score-card-tier {
            font-size: 0.9rem; color: #888;
            margin-bottom: 12px;
        }
        .score-card-tier .dot { color: #5CE1E6; margin-right: 5px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
            border-radius: 3px;
            transition: width 1s ease;
            box-shadow: 0 0 10px rgba(92, 225, 230, 0.5);
        }
        .upload-section { text-align: center; margin-top: 20px; }
        .upload-btn {
            background: linear-gradient(135deg, #5CE1E6, #00CED1);
            color: #000;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-size: 1rem; font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .upload-btn:disabled { background: #555; cursor: not-allowed; }
        #fileInput { display: none; }
        .loading {
            display: none; text-align: center; padding: 20px;
        }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid rgba(92, 225, 230, 0.2);
            border-top: 3px solid #5CE1E6;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .score-card.hidden { opacity: 0.3; }
        .score-card.hidden .score-card-value { color: #555; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-icon"></div>
            <div class="header-title">PSL</div>
            <div class="appstore-icon">🍎</div>
        </div>

        <div class="avatar-container">
            <div class="avatar-placeholder" id="avatarPlaceholder" onclick="document.getElementById('fileInput').click()">📸</div>
            <img src="" alt="Avatar" class="avatar" id="avatarImage" style="display: none;">
        </div>

        <div class="score-grid">
            <div class="score-card hidden" id="card-overall">
                <div class="score-card-label">TỔNG THỂ</div>
                <div class="score-card-value" id="overallScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="overallTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="overallProgress" style="width: 0%"></div></div>
            </div>
            
            <div class="score-card hidden" id="card-potential">
                <div class="score-card-label">TIỀM NĂNG</div>
                <div class="score-card-value" id="potentialScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="potentialTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="potentialProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-appeal">
                <div class="score-card-label">APPEAL</div>
                <div class="score-card-value" id="appealScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="appealTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="appealProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-jaw">
                <div class="score-card-label">HÀM (JAW)</div>
                <div class="score-card-value" id="jawScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="jawTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="jawProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-eyes">
                <div class="score-card-label">MẮT (EYES)</div>
                <div class="score-card-value" id="eyesScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="eyesTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="eyesProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-nose">
                <div class="score-card-label">MŨI (NOSE)</div>
                <div class="score-card-value" id="noseScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="noseTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="noseProgress" style="width: 0%"></div></div>
            </div>
            
            <div class="score-card hidden" id="card-skin">
                <div class="score-card-label">DA MẶT (SKIN)</div>
                <div class="score-card-value" id="skinScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="skinTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="skinProgress" style="width: 0%"></div></div>
            </div>
        </div>

        <div class="upload-section">
            <input type="file" id="fileInput" accept="image/*">
            <button class="upload-btn" id="uploadBtn">📸 Tải ảnh lên để chấm điểm</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #5CE1E6;">Đang quét 468 điểm và tính toán...</p>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ==========================================
        // LOGIC TOÁN HỌC & CHẤM ĐIỂM CHẶT CHẼ
        // ==========================================
        
        function euclideanDistance(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }

        function calculateAngle(p1, p2, p3) {
            const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
            const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
            const dotProduct = v1.x * v2.x + v1.y * v2.y;
            const magnitude = Math.sqrt(v1.x * v1.x + v1.y * v1.y) * Math.sqrt(v2.x * v2.x + v2.y * v2.y);
            if (magnitude === 0) return 0;
            const cosTheta = Math.max(-1, Math.min(1, dotProduct / magnitude));
            return Math.acos(cosTheta) * (180 / Math.PI);
        }

        function goldenRatioScore(actual, ideal) {
            const deviation = Math.abs((actual - ideal) / ideal);
            // Công thức chặt chẽ: Trừ điểm mạnh tay nếu lệch chuẩn
            return Math.max(0, Math.min(100, 100 - (deviation * 150))); 
        }

        function classifyTier(score) {
            if (score < 50) return "LTN";
            if (score < 60) return "MTN";
            if (score < 70) return "HTN";
            if (score < 80) return "Chad";
            return "Gigachad";
        }

        function analyzeFaceMetrics(landmarks, imgData) {
            // 1. APPEAL: Tỷ lệ vàng khuôn mặt (Height / Width)
            const faceWidth = euclideanDistance(landmarks[234], landmarks[454]);
            const faceHeight = euclideanDistance(landmarks[10], landmarks[152]);
            const faceRatio = faceHeight / faceWidth;
            const appealScore = goldenRatioScore(faceRatio, 1.618);

            // 2. HÀM (JAW): Góc hàm (Gonial angle) - Landmarks 172, 152, 397
            const jawAngle = calculateAngle(landmarks[172], landmarks[152], landmarks[397]);
            // Góc chuẩn nam giới: ~120-130 độ. Lệch 1 độ trừ 2 điểm (Rất chặt)
            const jawScore = Math.max(0, Math.min(100, 100 - Math.abs(jawAngle - 125) * 2.5));

            // 3. MẮT (EYES): Khoảng cách 2 mắt / Chiều rộng mặt
            const eyeDistance = euclideanDistance(landmarks[33], landmarks[263]);
            const eyeRatio = eyeDistance / faceWidth;
            const eyesScore = goldenRatioScore(eyeRatio, 0.46);

            // 4. MŨI (NOSE): Chiều dài mũi / Chiều rộng mũi
            const noseLength = euclideanDistance(landmarks[6], landmarks[2]);
            const noseWidth = euclideanDistance(landmarks[98], landmarks[327]);
            const noseRatio = noseLength / noseWidth;
            const noseScore = goldenRatioScore(noseRatio, 1.1);

            // 5. DA MẶT (SKIN): Tính độ lệch chuẩn màu da (giả lập texture)
            // Lấy vùng má phải (landmark 234 area)
            let skinScore = 60; // Mặc định
            if (imgData) {
                // Logic đơn giản hóa cho frontend: Dựa vào độ sáng trung bình
                // Trong thực tế cần phân tích pixel phức tạp hơn
                skinScore = 55 + Math.random() * 10; // Giả lập điểm da từ 55-65 cho demo frontend
            }

            // TỔNG THỂ (Weighted Average - Chặt chẽ)
            const weights = { appeal: 0.25, jaw: 0.25, eyes: 0.20, nose: 0.15, skin: 0.15 };
            const overallScore = (appealScore * weights.appeal) + 
                                 (jawScore * weights.jaw) + 
                                 (eyesScore * weights.eyes) + 
                                 (noseScore * weights.nose) + 
                                 (skinScore * weights.skin);

            // TIỀM NĂNG
            const potentialScore = overallScore + (100 - overallScore) * 0.4;

            return {
                appeal: Math.round(appealScore),
                jaw: Math.round(jawScore),
                eyes: Math.round(eyesScore),
                nose: Math.round(noseScore),
                skin: Math.round(skinScore),
                overall: Math.round(overallScore),
                potential: Math.round(potentialScore)
            };
        }

        // ==========================================
        // XỬ LÝ MEDIAPIPE & GIAO DIỆN
        // ==========================================
        
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults((results) => {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('uploadBtn').disabled = false;

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                // Lấy dữ liệu ảnh để tính da (tạm thời bỏ qua để code nhẹ)
                const metrics = analyzeFaceMetrics(landmarks, null);

                const scores = {
                    overall: metrics.overall,
                    potential: metrics.potential,
                    appeal: metrics.appeal,
                    jaw: metrics.jaw,
                    eyes: metrics.eyes,
                    nose: metrics.nose,
                    skin: metrics.skin
                };

                updateUI(scores);
            } else {
                alert("❌ Không tìm thấy khuôn mặt! Hãy chụp rõ mặt, nhìn thẳng.");
            }
        });

        function updateUI(scores) {
            const fields = ['overall', 'potential', 'appeal', 'jaw', 'eyes', 'nose', 'skin'];
            
            fields.forEach(field => {
                const score = scores[field];
                const tier = classifyTier(score);
                const maxScore = 100;
                
                document.getElementById(field + 'Score').textContent = score;
                document.getElementById(field + 'Tier').textContent = tier;
                document.getElementById(field + 'Progress').style.width = `${(score / maxScore) * 100}%`;
                document.getElementById('card-' + field).classList.remove('hidden');
            });
        }

        // Event Listeners
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const avatarImage = document.getElementById('avatarImage');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');
        const loading = document.getElementById('loading');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            loading.classList.add('show');
            uploadBtn.disabled = true;
            
            // Reset UI
            ['overall', 'potential', 'appeal', 'jaw', 'eyes', 'nose', 'skin'].forEach(f => {
                document.getElementById('card-' + f).classList.add('hidden');
            });

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = async () => {
                    avatarImage.src = event.target.result;
                    avatarImage.style.display = 'block';
                    avatarPlaceholder.style.display = 'none';

                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    // Gửi ảnh vào MediaPipe
                    await faceMesh.send({image: canvas});
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
