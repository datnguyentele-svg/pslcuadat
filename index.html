<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Face Scorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 25px;
            padding: 25px 20px;
            border: 1px solid #1a1a1a;
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .header-icon {
            width: 45px; height: 45px;
            border: 2px solid #5CE1E6;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .header-title { font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; }
        .appstore-icon {
            width: 45px; height: 45px;
            background: #007AFF;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px;
        }
        .avatar-container {
            position: relative;
            width: 180px; height: 180px;
            margin: 0 auto 30px;
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #5CE1E6;
        }
        .avatar-placeholder {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1a1a1a;
            border: 3px dashed #5CE1E6;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem;
            cursor: pointer;
        }
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        .score-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 18px 15px;
            position: relative;
            overflow: hidden;
        }
        .score-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
        }
        .score-card-label {
            font-size: 0.85rem; font-weight: bold;
            color: #5CE1E6;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .score-card-value {
            font-size: 2.2rem; font-weight: bold;
            color: white;
            margin-bottom: 3px;
        }
        .score-card-tier {
            font-size: 0.9rem; color: #888;
            margin-bottom: 12px;
        }
        .score-card-tier .dot { color: #5CE1E6; margin-right: 5px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5CE1E6, #00CED1);
            border-radius: 3px;
            transition: width 1s ease;
            box-shadow: 0 0 10px rgba(92, 225, 230, 0.5);
        }
        .upload-section { text-align: center; margin-top: 20px; }
        .upload-btn {
            background: linear-gradient(135deg, #5CE1E6, #00CED1);
            color: #000;
            border: none;
            padding: 14px 35px;
            border-radius: 25px;
            font-size: 1rem; font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .upload-btn:disabled { background: #555; cursor: not-allowed; }
        #fileInput { display: none; }
        .loading { display: none; text-align: center; padding: 20px; }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid rgba(92, 225, 230, 0.2);
            border-top: 3px solid #5CE1E6;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .score-card.hidden { opacity: 0.3; }
        .score-card.hidden .score-card-value { color: #555; }
        
        .api-section {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .api-section label {
            display: block;
            color: #5CE1E6;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .api-input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .api-input:focus { outline: none; border-color: #5CE1E6; }
        .api-hint { color: #888; font-size: 0.75rem; margin-top: 5px; }
        .api-hint a { color: #5CE1E6; text-decoration: none; }
        
        .change-key-btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .change-key-btn:hover {
            background: #555;
        }
        
        .error-msg {
            background: #331111;
            border: 1px solid #ff4444;
            color: #ff6666;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 0.9rem;
        }
        .error-msg.show { display: block; }
        
        .mode-badge {
            display: inline-block;
            background: #5CE1E6;
            color: #000;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-icon"></div>
            <div class="header-title">PSL</div>
            <div class="appstore-icon">🍎</div>
        </div>

        <div class="avatar-container">
            <div class="avatar-placeholder" id="avatarPlaceholder" onclick="document.getElementById('fileInput').click()">📸</div>
            <img src="" alt="Avatar" class="avatar" id="avatarImage" style="display: none;">
        </div>

        <div class="api-section" id="apiSection">
            <label> OpenAI API Key <span class="mode-badge">GPT-4o-mini</span></label>
            <input type="password" id="apiKey" class="api-input" placeholder="sk-proj-xxxxxxxxxxxx">
            <div class="api-hint">
                → Lấy key tại: <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a>
            </div>
            <button class="change-key-btn" onclick="clearApiKey()">🔄 Đổi API Key</button>
        </div>

        <div class="score-grid">
            <div class="score-card hidden" id="card-overall">
                <div class="score-card-label">TỔNG THỂ</div>
                <div class="score-card-value" id="overallScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="overallTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="overallProgress" style="width: 0%"></div></div>
            </div>
            
            <div class="score-card hidden" id="card-potential">
                <div class="score-card-label">TIỀM NĂNG</div>
                <div class="score-card-value" id="potentialScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="potentialTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="potentialProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-appeal">
                <div class="score-card-label">APPEAL</div>
                <div class="score-card-value" id="appealScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="appealTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="appealProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-jaw">
                <div class="score-card-label">HÀM (JAW)</div>
                <div class="score-card-value" id="jawScore">-</div>
                <div class="score-card-tier"><span class="dot">•</span><span id="jawTier">Chưa chấm</span></div>
                <div class="progress-bar"><div class="progress-fill" id="jawProgress" style="width: 0%"></div></div>
            </div>

            <div class="score-card hidden" id="card-eyes">
                <div class="score-card-label">MẮT (EYES
